services:
  # ===== PostgreSQL 数据库 =====
  postgres:
    image: pgvector/pgvector:pg16
    container_name: interview-beginner-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: interview_beginner
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ===== Spring Boot 后端 =====
  backend:
    build: ./backend
    container_name: interview-beginner-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/interview_beginner
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      APP_ENCRYPTION_KEY: ""
    ports:
      - "8080:8080"

  # ===== React 前端 (Nginx) =====
  frontend:
    build: ./frontend
    container_name: interview-beginner-web
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pg_data:
